<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloudflare IP 测速管理面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script type="importmap">
  {
    "imports": {
      "@material/web/": "/material-web/",
      "@lit/context": "/material-web/node_modules/@lit/context/index.js",
      "@lit/context/": "/material-web/node_modules/@lit/context/",
      "@lit/reactive-element": "/material-web/node_modules/@lit/reactive-element/reactive-element.js",
      "@lit/reactive-element/": "/material-web/node_modules/@lit/reactive-element/",
      "lit": "/material-web/node_modules/lit/index.js",
      "lit/": "/material-web/node_modules/lit/",
      "lit-element": "/material-web/node_modules/lit-element/index.js",
      "lit-element/": "/material-web/node_modules/lit-element/",
      "lit-html": "/material-web/node_modules/lit-html/lit-html.js",
      "lit-html/": "/material-web/node_modules/lit-html/",
      "tslib": "/material-web/node_modules/tslib/tslib.es6.mjs"
    }
  }
  </script>
  <script type="module">
    import '@material/web/all.js';
    import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';

    if (document.adoptedStyleSheets && typescaleStyles.styleSheet) {
      document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    }
  </script>
  <script defer crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script defer crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script defer src="/app.js"></script>
</head>
<body>
  <noscript>需要启用 JavaScript 才能使用管理面板。</noscript>
  <div id="root"></div>
</body>
</html>
