name: CfSpeedtest Client NativeAOT Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: "src/CfSpeedtest.Client/CfSpeedtest.Client.csproj"

jobs:
  build-and-package:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x86
            archive_name: cfspeedtest-client-win-x86
            archive_ext: zip
          - runner: windows-latest
            rid: win-x64
            archive_name: cfspeedtest-client-win-x64
            archive_ext: zip
          - runner: windows-latest
            rid: win-arm64
            archive_name: cfspeedtest-client-win-arm64
            archive_ext: zip
          - runner: ubuntu-latest
            rid: linux-x64
            archive_name: cfspeedtest-client-linux-x64
            archive_ext: zip
          - runner: ubuntu-latest
            rid: linux-musl-x64
            archive_name: cfspeedtest-client-linux-musl-x64
            archive_ext: zip
          - runner: ubuntu-latest
            rid: linux-arm64
            archive_name: cfspeedtest-client-linux-arm64
            archive_ext: zip
          - runner: ubuntu-latest
            rid: linux-musl-arm64
            archive_name: cfspeedtest-client-linux-musl-arm64
            archive_ext: zip
          - runner: ubuntu-latest
            rid: linux-arm
            archive_name: cfspeedtest-client-linux-arm
            archive_ext: zip
          - runner: macos-14
            rid: osx-x64
            archive_name: cfspeedtest-client-osx-x64
            archive_ext: zip
          - runner: macos-14
            rid: osx-arm64
            archive_name: cfspeedtest-client-osx-arm64
            archive_ext: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux ARM64 cross-compilation tools
        if: runner.os == 'Linux' && (matrix.rid == 'linux-arm64' || matrix.rid == 'linux-musl-arm64')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld gcc-aarch64-linux-gnu zlib1g-dev

      - name: Install Linux ARM cross-compilation tools
        if: runner.os == 'Linux' && matrix.rid == 'linux-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld gcc-arm-linux-gnueabihf zlib1g-dev

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish NativeAOT
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish/${{ matrix.rid }}
          /p:PublishSingleFile=true
          /p:StripSymbols=true
          ${{ runner.os == 'Linux' && '-p:LinkerFlavor=lld' || '' }}
        env:
          COMPlus_CrossCompiling: ${{ (matrix.rid == 'linux-arm64' || matrix.rid == 'linux-musl-arm64' || matrix.rid == 'linux-arm') && '1' || '0' }}

      - name: Remove debug symbols (Windows)
        if: runner.os == 'Windows'
        run: Get-ChildItem -Path ./publish/${{ matrix.rid }} -Recurse -Include *.pdb | Remove-Item -Force
        shell: pwsh

      - name: Remove debug symbols (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          find ./publish/${{ matrix.rid }} -type f -name "*.pdb" -delete || true
          find ./publish/${{ matrix.rid }} -type f -name "*.dbg" -delete || true
          find ./publish/${{ matrix.rid }} -type d -name "*.dSYM" -exec rm -rf {} + || true
        shell: bash

      - name: Create zip archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ./publish/${{ matrix.rid }}/* -DestinationPath ./${{ matrix.archive_name }}.${{ matrix.archive_ext }}
        shell: pwsh

      - name: Create zip archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../${{ matrix.archive_name }}.${{ matrix.archive_ext }} .
        shell: bash

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}

  create-release:
    name: Create GitHub Release
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
